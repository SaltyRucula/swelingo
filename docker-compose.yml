services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sweduolingo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust API ────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api-rust
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/sweduolingo
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3001}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - WEB_URL=${WEB_URL:-http://localhost}
      - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api-rust/challenges:/app/challenges:ro
    restart: unless-stopped

  # ── Expo web (nginx) ────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped
    depends_on:
      - api

volumes:
  pgdata:
