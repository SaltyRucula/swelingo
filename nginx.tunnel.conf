# Cloudflare Tunnel nginx config — plain HTTP only.
#
# Cloudflare terminates TLS at the edge and forwards plain HTTP through the
# tunnel to this container, so there is NO SSL, NO 443, and NO Let's Encrypt
# here. nginx serves the SPA and reverse-proxies the API routes to the Rust
# `api` service on the internal Docker network.
#
# server_name `_` is a catch-all so it answers for whatever public hostname
# Cloudflare sends (e.g. swelingo.com).
server {
    listen 80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location ~ ^/(challenges|me|auth|leaderboard|squads|users) {
        proxy_pass         http://api:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Public scheme is always https (Cloudflare edge), even though the
        # tunnel hop into nginx is plain http.
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── index.html — never cache ───────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── Static assets — long cache ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Block sensitive files ──────────────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        return 404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
