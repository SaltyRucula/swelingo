# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name swelingo.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS — main app ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name swelingo.com;

    ssl_certificate     /etc/letsencrypt/live/swelingo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swelingo.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API proxy ──────────────────────────────────────────────────────────────
    location ~ ^/(challenges|me|auth|leaderboard|squads|users) {
        proxy_pass         http://api:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── index.html — never cache ───────────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # ── Static assets — long cache ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Block sensitive files ──────────────────────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        return 404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
